{% extends 'base.html' %}

{% block title %}{{ action }} | Travel NIKO{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
    <h1 class="text-3xl font-semibold text-slate-900">{{ action }}</h1>
    <form method="POST" enctype="multipart/form-data" class="mt-8 space-y-5">
        {{ form.hidden_tag() }}
        <label class="block">
            <span class="text-slate-700">Название агентства</span>
            {{ form.name(class_='mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 focus:border-cyan-500') }}
        </label>
        <label class="block">
            <span class="text-slate-700">Описание</span>
            {{ form.description(class_='mt-2 block w-full rounded-3xl border border-slate-300 bg-slate-50 px-4 py-4 text-slate-900 focus:border-cyan-500', rows=6) }}
        </label>
        <label class="block">
            <span class="text-slate-700">Контактная информация</span>
            {{ form.contact_info(class_='mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 focus:border-cyan-500') }}
        </label>
        <label class="block">
            <span class="text-slate-700">Изображение</span>
            <input type="file" name="image" accept="image/*" class="mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900" />
        </label>
        <button type="submit" class="inline-flex justify-center rounded-2xl bg-cyan-600 px-6 py-3 text-sm font-semibold text-white hover:bg-cyan-700">{{ action }}</button>
    </form>
</div>
{% endblock %}
