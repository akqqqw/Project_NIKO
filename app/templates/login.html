{% extends 'base.html' %}

{% block title %}Вход | Travel NIKO{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl sm:rounded-3xl border border-slate-200 px-4 sm:px-8 py-8 sm:py-12 shadow-sm">
    <h1 class="text-2xl sm:text-3xl font-semibold text-slate-900">Вход</h1>
    <p class="mt-2 text-sm sm:text-base text-slate-600">Используйте email и пароль для доступа.</p>
    <form method="POST" class="mt-6 sm:mt-8 space-y-4 sm:space-y-5">
        {{ form.hidden_tag() }}
        <label class="block">
            <span class="text-sm font-medium text-slate-700">Email</span>
            {{ form.email(class_='mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm sm:text-base text-slate-900 focus:border-cyan-500 focus:outline-none') }}
        </label>
        <label class="block">
            <span class="text-sm font-medium text-slate-700">Пароль</span>
            {{ form.password(class_='mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm sm:text-base text-slate-900 focus:border-cyan-500 focus:outline-none') }}
        </label>
        <button type="submit" class="inline-flex w-full justify-center rounded-2xl bg-cyan-600 px-4 py-3 text-sm font-semibold text-white hover:bg-cyan-700 transition">{{ form.submit.label.text }}</button>
    </form>
    <p class="mt-4 sm:mt-6 text-xs sm:text-sm text-slate-600">Нет аккаунта? <a href="{{ url_for('auth.register') }}" class="text-cyan-600 hover:underline">Зарегистрироваться</a></p>
</div>
{% endblock %}
